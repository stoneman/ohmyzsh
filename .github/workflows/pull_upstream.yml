name: Pull upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false
      - run: |
          set -ex;
          echo ${WORKFLOW_TOKEN} | gh auth login --with-token;
          git remote add upstream https://github.com/ohmyzsh/ohmyzsh
          git fetch upstream master;
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com";
          git config --local user.name  "GitHub Actions";

          # Rebase with conflict resolution for installer.yml deletion
          if ! git rebase upstream/master; then
            while [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; do
              # Check if installer.yml is in conflict
              if git diff --name-only --diff-filter=U | grep -q "^.github/workflows/installer.yml$"; then
                echo "Keeping deletion of .github/workflows/installer.yml"
                git rm .github/workflows/installer.yml
                GIT_EDITOR=true git rebase --continue || true
              else
                # Unknown conflict - fail the workflow
                echo "Unexpected conflicts in:"
                git diff --name-only --diff-filter=U | grep -v "^.github/workflows/installer.yml$"
                git rebase --abort
                exit 1
              fi
            done
          fi

          if [ "$(git status | grep diverged)" ]; then
              ORIGIN_URL=$(git remote get-url origin);
              git push "${ORIGIN_URL/https:\/\//https:\/\/$WORKFLOW_TOKEN@}" $(git branch --show-current) --force;
          fi;
        shell: bash
        env:
          WORKFLOW_TOKEN: ${{ secrets.PULL_UPSTREAM_PAT }}
